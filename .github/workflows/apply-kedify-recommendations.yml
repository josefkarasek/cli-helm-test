name: Apply Kedify Recommendations

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cluster_id:
        description: Kedify cluster ID. Falls back to repository variable KEDIFY_CLUSTER_ID.
        required: false
      api_url:
        description: Kedify API URL. Falls back to repository variable KEDIFY_API_URL.
        required: false
      min_confidence:
        description: Inclusive minimum confidence threshold. Falls back to repository variable KEDIFY_MIN_CONFIDENCE.
        required: false
        default: "20"

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout demo repository
        uses: actions/checkout@v4

      - name: Resolve workflow configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          cluster_id="${{ inputs.cluster_id }}"
          if [ -z "${cluster_id}" ]; then
            cluster_id="${{ vars.KEDIFY_CLUSTER_ID }}"
          fi
          if [ -z "${cluster_id}" ]; then
            echo "KEDIFY_CLUSTER_ID input or repository variable is required." >&2
            exit 1
          fi

          api_url="${{ inputs.api_url }}"
          if [ -z "${api_url}" ]; then
            api_url="${{ vars.KEDIFY_API_URL }}"
          fi
          if [ -z "${api_url}" ]; then
            api_url="https://api.dev.kedify.io/v1"
          fi

          min_confidence="${{ inputs.min_confidence }}"
          if [ -z "${min_confidence}" ]; then
            min_confidence="${{ vars.KEDIFY_MIN_CONFIDENCE }}"
          fi
          if [ -z "${min_confidence}" ]; then
            min_confidence="20"
          fi

          echo "cluster_id=${cluster_id}" >> "${GITHUB_OUTPUT}"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"
          echo "min_confidence=${min_confidence}" >> "${GITHUB_OUTPUT}"

      - name: Install kedify with Homebrew
        shell: bash
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew tap kedify/tap
          brew install kedify/tap/kedify

      - name: Verify kedify installation
        shell: bash
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          command -v kedify
          kedify --help >/dev/null

      - name: Apply recommendations
        env:
          KEDIFY_TOKEN: ${{ secrets.KEDIFY_PAT }}
          KEDIFY_CLUSTER_ID: ${{ steps.config.outputs.cluster_id }}
          KEDIFY_API_URL: ${{ steps.config.outputs.api_url }}
          KEDIFY_MIN_CONFIDENCE: ${{ steps.config.outputs.min_confidence }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          chmod +x ./scripts/apply-kedify-recommendations.sh
          ./scripts/apply-kedify-recommendations.sh

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- chart/values.yaml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create pull request with gh
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BRANCH: kedify/apply-recommendations
          PR_TITLE: Apply Kedify recommendations
          PR_BODY: |
            This pull request was generated by the `Apply Kedify Recommendations` workflow.

            It:
            - fetched live Kedify recommendations for the configured cluster
            - applied waiting workload recommendations to `chart/values.yaml`
            - prepared the result for human review before merge
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${PR_BRANCH}"
          git add chart/values.yaml
          git commit -m "${PR_TITLE}"
          git push --force-with-lease --set-upstream origin "${PR_BRANCH}"

          if gh pr view "${PR_BRANCH}" >/dev/null 2>&1; then
            gh pr edit "${PR_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}"
          else
            gh pr create \
              --base "${GITHUB_REF_NAME}" \
              --head "${PR_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}"
          fi
